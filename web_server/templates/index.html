<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        h1 { text-align: center; margin-bottom: 2rem; }
        .stats-row { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem 3rem;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 2.5rem; font-weight: bold; }
        .stat-label { font-size: 1rem; opacity: 0.8; }
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .chart-box {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 15px;
        }
        @media (max-width: 900px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>System Resource Monitor</h1>
    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-value" id="cpuValue">0%</div>
            <div class="stat-label">CPU Usage</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="ramValue">0%</div>
            <div class="stat-label">RAM Usage</div>
        </div>
    </div>
    <div class="charts-container">
        <div class="chart-box">
            <canvas id="cpuChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="ramChart"></canvas>
        </div>
    </div>

    <script>
        const cpuLabels = Array(30).fill('').map((_, i) => 30 - i);
        const ramLabels = Array(30).fill('').map((_, i) => 30 - i);
        const cpuData = Array(30).fill(0);
        const ramData = Array(30).fill(0);

        const cpuCtx = document.getElementById('cpuChart').getContext('2d');
        const ramCtx = document.getElementById('ramChart').getContext('2d');

        const cpuChart = new Chart(cpuCtx, {
            type: 'line',
            data: {
                labels: cpuLabels,
                datasets: [{
                    label: 'CPU %',
                    data: cpuData,
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { display: false },
                    y: { min: 0, max: 100, ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                }
            }
        });

        const ramChart = new Chart(ramCtx, {
            type: 'line',
            data: {
                labels: ramLabels,
                datasets: [{
                    label: 'RAM %',
                    data: ramData,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { display: false },
                    y: { min: 0, max: 100, ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                }
            }
        });

        function updateStats() {
            fetch('/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('cpuValue').textContent = data.cpu.toFixed(1) + '%';
                    document.getElementById('ramValue').textContent = data.ram.toFixed(1) + '%';

                    cpuData.shift();
                    cpuData.push(data.cpu);
                    ramData.shift();
                    ramData.push(data.ram);

                    cpuChart.update();
                    ramChart.update();
                });
        }

        updateStats();
        setInterval(updateStats, 1000);
    </script>
</body>
</html>
